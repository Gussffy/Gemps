<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - GemPS</title>
  <!-- CSS -->
  <link rel="stylesheet" href="../style/cadastro.css">
</head>
<body>
<img src="../../src/img/Logotipo.png" alt="logo GemPS" class="logo">

<div id="telaCadastro">
  <div class="form-container">
    <h1>Criar Conta</h1>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmaSenha" placeholder="Confirme a Senha">
    <button type="button" id="botao-cadastrar">Cadastrar</button>
    <div class="link-container">
      <h5>Já tem uma conta?</h5>
      <button class="botao-login">Fazer Login</button>
    </div>
  </div>
</div>
<footer aria-hidden="true"></footer>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/modules/util.js"></script>
</body>
</html>
