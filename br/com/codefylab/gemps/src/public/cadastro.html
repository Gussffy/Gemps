<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - GemPS</title>
  <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
<img src="../img/Logotipo.png" alt="logo GemPS" class="logo">

<div id="telaCadastro">
  <div class="form-container">
    <h1>Criar Conta</h1>
    <input type="text" placeholder="Nome Completo">
    <input type="email" placeholder="E-mail">
    <input type="text" placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <input type="password" placeholder="Confirme a Senha">
    <button type="button" id="botao-cadastrar">Cadastrar</button>
    <div class="link-container">
      <h5>Já tem uma conta?</h5>
      <button class="botao-login">Fazer Login</button>
    </div>
  </div>
</div>
<footer aria-hidden="true"></footer>
<script src="../js/util.js"></script>
</body>
</html>
