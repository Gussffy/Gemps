<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemPS</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
          integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
          crossorigin=""/>

    <!-- Map Tiler CSS -->
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.0.1/maptiler-sdk.css" rel="stylesheet" />

    <!-- Estilo personalizado -->
    <link rel="stylesheet" href="../style/styles.css" />
</head>
<body>
<!-- Barra superior -->
<header>
    <div class="logo">
        <img src="../img/Logotipo.png" alt="Logo GemPS">
    </div>
    <div class="search-bar">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar sala..." autocomplete="off">
            <div class="search-icon">🔍</div>
            <div id="searchSuggestions" class="suggestions-container"></div>
            <div id="searchFeedback"></div>
        </div>
    </div>
</header>
<!-- Mapa -->
<div id="mapid"></div>
<!-- No seu map.html -->

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
        integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
        crossorigin=""></script>

<script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.0.1/maptiler-sdk.umd.min.js" ></script>
<script src="https://cdn.maptiler.com/leaflet-maptilersdk/v4.0.2/leaflet-maptilersdk.umd.min.js" ></script>

<!-- Módulo principal como type="module" -->
<script src="../js/main.js" type="module"></script>

</body>
</html>
